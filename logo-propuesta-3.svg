<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="50%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#5eead4"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Anillos concéntricos (apertura de lente / AURA) -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#14b8a6" stroke-width="0.6" stroke-opacity="0.12"/>
  <circle cx="100" cy="100" r="70" fill="none" stroke="#14b8a6" stroke-width="0.8" stroke-opacity="0.18"/>
  <circle cx="100" cy="100" r="55" fill="none" stroke="#14b8a6" stroke-width="1" stroke-opacity="0.25"/>
  <!-- Pétalos del obturador -->
  <g opacity="0.9">
    <polygon points="100,100 140,55 155,75" fill="url(#grad3)" opacity="0.3"/>
    <polygon points="100,100 160,100 155,125" fill="url(#grad3)" opacity="0.3"/>
    <polygon points="100,100 140,145 120,155" fill="url(#grad3)" opacity="0.3"/>
    <polygon points="100,100 80,155 60,140" fill="url(#grad3)" opacity="0.3"/>
    <polygon points="100,100 40,125 45,100" fill="url(#grad3)" opacity="0.3"/>
    <polygon points="100,100 45,75 60,55" fill="url(#grad3)" opacity="0.3"/>
  </g>
  <!-- Centro -->
  <circle cx="100" cy="100" r="10" fill="#0f172a" stroke="url(#grad3)" stroke-width="2"/>
  <circle cx="100" cy="100" r="4" fill="#14b8a6" filter="url(#glow3)"/>
  <!-- Anillo exterior decorativo -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#14b8a6" stroke-width="1.2" stroke-opacity="0.15" stroke-dasharray="3 6"/>
</svg>
