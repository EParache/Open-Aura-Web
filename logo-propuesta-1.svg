<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="aura1" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#14b8a6" stop-opacity="0.3"/>
      <stop offset="70%" stop-color="#0d9488" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core1" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#ccfbf1"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </radialGradient>
  </defs>
  <!-- Anillos tipo aura -->
  <circle cx="100" cy="95" r="80" fill="url(#aura1)"/>
  <circle cx="100" cy="95" r="62" fill="none" stroke="#14b8a6" stroke-width="1.5" stroke-opacity="0.4"/>
  <circle cx="100" cy="95" r="48" fill="none" stroke="#14b8a6" stroke-width="1.5" stroke-opacity="0.6"/>
  <circle cx="100" cy="95" r="34" fill="none" stroke="#14b8a6" stroke-width="1.5" stroke-opacity="0.8"/>
  <!-- Núcleo: ojo minimalista -->
  <ellipse cx="100" cy="95" rx="18" ry="12" fill="none" stroke="#ccfbf1" stroke-width="3" stroke-linecap="round"/>
  <circle cx="100" cy="95" r="5" fill="#ccfbf1"/>
  <!-- Aura exterior sutil -->
  <circle cx="100" cy="95" r="90" fill="none" stroke="#14b8a6" stroke-width="0.5" stroke-opacity="0.2" stroke-dasharray="4 8"/>
</svg>
